<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Regístrate!</title>
    <link rel="stylesheet" href="/styles/styles.css">                                
    <link rel="icon" type="image/x-icon" href="/img/favicon.png">                             
<body>
    <header>
        <div class="logo-container">
            <img src="/img/Icono_logoautobooks.png" alt="Logo" class="logo-img">
            <div class="logo-text">Autobooks</div>     
        </div>
    </header>
    
    <div class="login-register">                
        <form class="register-form">
            <h2>Registro de usuario</h2>    
            <div class="role-selection">
                <label>
                    <input type="radio" name="role" value="Instructor"> Instructor
                </label>
                <label>
                    <input type="radio" name="role" value="Aprendiz"> Aprendiz   
                </label>
                <label>
                    <input type="radio" name="role" value="Funcionarios"> Funcionarios
                </label>
            </div>
            <div class="form-group">         
                <label for="name">Nombres y Apellidos:</label>        
                <input type="text" id="name" name="name" placeholder="Usuario" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Crea una contraseña" required>
            </div>
            <div class="form-group">
                <label for="repeat-password">Confirma tu contraseña:</label>
                <input type="password" id="repeat-password" name="repeat-password" placeholder="Repite la contraseña" required>
            </div>
            <div class="form-group">
                <label for="email">Correo:</label>
                <input type="email" id="email" name="email" placeholder="Pon tu correo soy sena" required>
            </div>
            <div class="form-actions">
                <button onclick="window.location.href='login.html'" type="submit">Crear usuario</button> 
                <button onclick="window.location.href='login.html'" type="submit">Iniciar sesión</button>
            </div>
        </form>
    </div>

    <footer>
        <p>&copy; 2024 Autobooks. Todos los derechos reservados.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
